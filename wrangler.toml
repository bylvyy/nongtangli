# Cloudflare Pages config for Nongtangli.
# We now run on @cloudflare/next-on-pages, so the build output lives in
# `.vercel/output/static`. D1 binding `DB` is consumed by app/api/** route
# handlers (edge runtime) and server pages via getRequestContext().env.
#
# Before first deploy:
#   wrangler d1 create nongtangli         (writes a database_id; paste below)
#   wrangler d1 migrations apply nongtangli --remote
#
# Local dev:
#   wrangler d1 migrations apply nongtangli --local
#   npm run pages:dev   (runs `next build && next-on-pages` then wrangler pages dev)

name = "nongtangli"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[d1_databases]]
binding = "DB"
database_name = "nongtangli"
# Fill in after `wrangler d1 create nongtangli`. Local dev uses the local
# SQLite stub regardless of this id.
database_id = "309e65ea-d0fa-4bb9-97aa-e5caeff9bdf0"

[vars]
# Non-secret. Admin password and AMAP_SERVER_KEY go through `wrangler secret`
# (or Pages dashboard → Settings → Environment variables → Encrypt).
PUBLIC_SITE_NAME = "Nongtangli"
